<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Autoplay</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<video id="video" autoplay loop>
    <source src="video.mp4" type="video/mp4">
</video>

<script>
window.onload = () => {
    document.getElementById("video").play();
};
</script>

</body>
</html>
</body>
</html>
